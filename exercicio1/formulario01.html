<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <h1>Exercício Prático 01</h1>
</head>
<body>

    <form action="/action_page.html">
        <fieldset>
            
            <legend><strong>Formulário Matricula de Curso</strong></legend>

            <p>
                <label for="pnome">Primeiro nome:</label><br>
                <input type="text" id="pnome" name="pnome">
            </p>

            <p>
                <label for="snome">Sobrenome:</label><br>
                <input type="text" id="snome" name="snome">
            </p>

            <p><strong>Curso:</strong><br>
                <input type="radio" id="tecnico" name="curso" value="tecnico">
                <label for="tecnico">Técnico em Informática</label><br>
                
                <input type="radio" id="graduacao" name="curso" value="graduacao">
                <label for="graduacao">Graduação - Análise e Desenvolvimento de Sistemas</label><br>
                
                <input type="radio" id="profissionalizante" name="curso" value="profissionalizante">
                <label for="profissionalizante">Profissionalizante - Programação Web</label>
            </p>

            <p><strong>Linguagens de programação de sua preferência:</strong><br>
                <input type="checkbox" id="php" name="lang" value="PHP">
                <label for="php">PHP</label><br>
                
                <input type="checkbox" id="java" name="lang" value="Java">
                <label for="java">Java</label><br>
                
                <input type="checkbox" id="python" name="lang" value="Python">
                <label for="python">Python</label>
            </p>

            <p>
                <label for="turno"><strong>Escolha um turno:</strong></label><br>
                <select name="turno" id="turno">
                    <option value="manha">Manhã</option>
                    <option value="tarde">Tarde</option>
                    <option value="noite">Noite</option>
                </select>
            </p>

            <p>
                <label for="unidade"><strong>Escolha uma unidade mais próximo a você:</strong></label><br>
                <input list="unidades" name="unidade" id="unidade" placeholder="Chapecó (usar tag <datalist>)">
                <datalist id="unidades">
                    <option value="Chapecó">
                    <option value="Blumenau">
                    <option value="Florianópolis">
                    <option value="Concórdia">
                </datalist>
            </p>

            <p>
                <input type="submit" value="Enviar">
            </p>

        </fieldset>
    </form>

</body>
</html>
