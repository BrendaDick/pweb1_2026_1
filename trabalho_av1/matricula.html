<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BDV Force - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black"> <div class="container-fluid p-0">
        <div class="row g-0 min-vh-100">
            
            <div class="col-lg-6 d-none d-lg-block position-relative">
                <div class="registration-overlay"></div>
                <img src="imagens/musculação.png" class="registration-img" alt="Treino">
                <div class="registration-text">
                    <a href="index.html">
                        <img src="imagens/BDV logo.png" alt="Logo" style="height: 80px;" class="mb-4">
                    </a>
                    <h1 class="display-4 fw-black italic">A SUA MELHOR <br><span class="text-danger">VERSÃO COMEÇA AQUI.</span></h1>
                </div>
            </div>

            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white">
                <div class="form-container p-5">
                    <div class="mb-4 text-center text-lg-start">
                        <h2 class="fw-black text-uppercase">Faça sua Matrícula</h2>
                        <p class="text-muted">Preencha os dados abaixo para ativar seu plano.</p>
                    </div>

                    <form action="#" class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-bold small">NOME COMPLETO</label>
                            <input type="text" class="form-control reg-input" maxlength="55" placeholder="Ex: João da Silva" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold small">CPF</label>
                            <input type="text" class="form-control reg-input" maxlength="13" placeholder="000.000.000-00" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold small">RG</label>
                            <input type="text" class="form-control reg-input" maxlength="13" placeholder="0.000.000" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold small">DATA DE NASCIMENTO</label>
                            <input type="text" class="form-control reg-input" maxlength="13" placeholder="DD/MM/AAAA" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold small">CELULAR (WHATSAPP)</label>
                            <input type="tel" class="form-control reg-input" placeholder="(00) 00000-0000">
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold small">ENDEREÇO RESIDENCIAL</label>
                            <input type="text" class="form-control reg-input" maxlength="55" placeholder="Rua, Número, Bairro" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold small">E-MAIL</label>
                            <input type="email" class="form-control reg-input" placeholder="seu@email.com" required>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-danger btn-lg w-100 fw-black rounded-0 py-3">
                                FINALIZAR MATRÍCULA <i class="fa-solid fa-chevron-right ms-2"></i>
                            </button>
                        </div>

                        <div class="col-12 text-center mt-3">
                            <a href="index.html" class="text-decoration-none text-dark small fw-bold">
                                <i class="fa-solid fa-arrow-left"></i> Voltar para Home
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

 <footer class="text-center py-4 text-muted border-top border-dark mt-5" style="background-color: #000;">
    <div class="container">
        <p class="text-white mb-0">&copy; 2026 BDV Force. Todos os direitos reservados.</p>
    </div>
</footer>

</body>
</html>
